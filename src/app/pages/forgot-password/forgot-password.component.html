<div class="forgot-page">
    <div class="forgot-card">
        <div class="forgot-header">
            <h2>Forgot Password</h2>
            <p>Reset your password in 3 simple steps</p>
        </div>

        <!-- Step 1: Email/Phone Input -->
        <div *ngIf="step === 1" class="forgot-body">
            <p class="step-desc">Enter your registered email or phone number to receive an OTP.</p>
            <input type="text" [(ngModel)]="identifier" placeholder="Email or Phone Number" class="forgot-input">
            <button (click)="sendOtp()" [disabled]="isLoading" class="forgot-btn">
                {{ isLoading ? 'Sending...' : 'Send OTP' }}
            </button>
        </div>

        <!-- Step 2: OTP Input -->
        <div *ngIf="step === 2" class="forgot-body">
            <p class="step-desc">Enter the OTP sent to <strong>{{ identifier }}</strong></p>
            <input type="text" [(ngModel)]="otp" placeholder="Enter 6-digit OTP" class="forgot-input">
            <button (click)="verifyOtp()" [disabled]="isLoading" class="forgot-btn">
                {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
            </button>
        </div>

        <!-- Step 3: New Password -->
        <div *ngIf="step === 3" class="forgot-body">
            <p class="step-desc">Create a new password.</p>
            <input type="password" [(ngModel)]="newPassword" placeholder="New Password" class="forgot-input">
            <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm Password" class="forgot-input">
            <button (click)="resetPassword()" [disabled]="isLoading" class="forgot-btn">
                {{ isLoading ? 'Resetting...' : 'Reset Password' }}
            </button>
        </div>

        <!-- Messages -->
        <div *ngIf="error" class="msg-error">{{ error }}</div>
        <div *ngIf="message" class="msg-success">{{ message }}</div>

        <!-- Back to Login -->
        <div class="forgot-footer">
            <a routerLink="/login">Back to Login</a>
        </div>
    </div>
</div>
